function buildInventario() {

  ["S","M","L","XL"].forEach(function(talla) {
    CATALOGO.forEach(function(cat) {
      ["Hombre","Mujer"].forEach(function(genero) {

// ── AI ────────────────────────────────────────────────────────────────────────
async function callAI(messages) {
  var res = await fetch("/.netlify/functions/claude", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({messages: messages})
  });
  if (!res.ok) { var t = await res.text(); throw new Error("HTTP "+res.status+": "+t.slice(0,150)); }
  var data = await res.json();
  if (data.error) throw new Error("API: "+JSON.stringify(data.error).slice(0,150));
  var txt = data.content && data.content[0] ? data.content[0].text || "" : "";
  if (!txt) throw new Error("Respuesta vacia");
  return JSON.parse(txt.replace(/```json|```/g,"").trim());
}
var EP = 'Extrae datos de ticket de uniforme Ferco. Formato Jira con etiquetas y asteriscos. Reglas: nombre=Nombres+ApellidoPaterno+ApellidoMaterno, Guatemala=GT HonduraS=HN ElSalvador=SV Mexico=MX, quita prefijo GT: de sucursal, Extragrande=XL Grande=L Mediana=M Pequena=S, REY DE LA CERAMICA=EL REY DE LA CERAMICA, polo/playera=POLO camisa=CAMISA blusa=BLUSA, negro=NEGRA blanco=BLANCA gris=GRIS. Solo JSON: {"empleado":"","pais":"GT","sucursal":"","departamento":"","puesto":"","motivo":"Primer ingreso","tipo":"CAMISA","color":"NEGRA","marca":"","talla":"M","genero":"Hombre","cantidad":1}';
async function extraerTexto(raw) {

function generarExcel(pedidos) {
  var pending = pedidos.filter(function(o){return o.estado==="Pendiente";});

  var cp = {BLANCA:"BLANCAS",NEGRA:"NEGRAS",GRIS:"GRISES"};
  function groupBy(arr, fn) { var m={}; arr.forEach(function(o){var k=fn(o);(m[k]=m[k]||[]).push(o);}); return m; }
  function sortT(arr) { return arr.slice().sort(function(a,b){return (TALLAS.indexOf(a.talla)||99)-(TALLAS.indexOf(b.talla)||99);}); }
  function agg(arr) { var a={}; arr.forEach(function(o){var k=o.genero+"|"+o.talla+"|"+(o.tallaEspecial||"")+"|"+o.color+"|"+o.marca; if(!a[k])a[k]=Object.assign({},o,{cantidad:0}); a[k].cantidad+=o.cantidad;}); return Object.values(a); }
  var hasEspecial = pending.some(function(o){return o.talla==="ESPECIAL";});
  var cols = hasEspecial ? 6 : 5;
  function tbl(rows, sp) {
    var s=sortT(agg(rows)), t=s.reduce(function(x,r){return x+r.cantidad;},0), bg=sp?"#F59E0B":"#C8102E";
    var espHeader = hasEspecial ? "<td style='border:1px solid #555;padding:5px;'>TALLA ESPECIAL</td>" : "";
    var totalSpan = hasEspecial ? 5 : 4;
    return "<tr><td colspan='"+cols+"' style='background:"+bg+";color:white;font-weight:bold;padding:6px;border:1px solid #ccc;'>Pedidos</td></tr>"+
      "<tr style='background:#1A202C;color:white;font-weight:bold;'><td style='border:1px solid #555;padding:5px;'>GENERO</td><td style='border:1px solid #555;padding:5px;'>TALLA</td>"+(hasEspecial?"<td style='border:1px solid #555;padding:5px;background:#7C3AED;'>TALLA ESPECIAL</td>":"")+"<td style='border:1px solid #555;padding:5px;'>COLOR</td><td style='border:1px solid #555;padding:5px;'>MARCA</td><td style='border:1px solid #555;padding:5px;'>CANTIDAD</td></tr>"+
      s.map(function(r,i){
        var espCell = hasEspecial ? "<td style='border:1px solid #E2E8F0;padding:5px;text-align:center;color:"+(r.talla==="ESPECIAL"?"#7C3AED":"#94A3B8")+"font-weight:"+(r.talla==="ESPECIAL"?"bold":"normal")+";'>"+(r.talla==="ESPECIAL"?(r.tallaEspecial||"-"):"-")+"</td>" : "";
        var tallaDisplay = r.talla==="ESPECIAL" ? "ESPECIAL" : r.talla;
        return "<tr style='background:"+(i%2===0?"#F8FAFC":"#FFF")+"'><td style='border:1px solid #E2E8F0;padding:5px;'>"+(gm[r.genero]||r.genero.toUpperCase())+"</td><td style='border:1px solid #E2E8F0;padding:5px;text-align:center;'>"+tallaDisplay+"</td>"+espCell+"<td style='border:1px solid #E2E8F0;padding:5px;'>"+(cp[r.color]||r.color)+"</td><td style='border:1px solid #E2E8F0;padding:5px;'>"+r.marca+"</td><td style='border:1px solid #E2E8F0;padding:5px;text-align:center;font-weight:bold;'>"+r.cantidad+"</td></tr>";
      }).join("")+
      "<tr style='background:#EBF4FF;font-weight:bold;'><td colspan='"+totalSpan+"' style='border:1px solid #E2E8F0;padding:5px;text-align:right;'>TOTAL</td><td style='border:1px solid #E2E8F0;padding:5px;text-align:center;'>"+t+"</td></tr><tr><td colspan='"+cols+"' style='padding:4px;'>&nbsp;</td></tr>";
  }
  var std=pending.filter(function(o){return o.marca==="FERCO CERAMICA";}), spc=pending.filter(function(o){return o.marca!=="FERCO CERAMICA";});
  var stdG=groupBy(std,function(o){return o.genero+"||"+o.color;}), spcG=groupBy(spc,function(o){return o.genero+"||"+o.color+"||"+o.marca;});
  var PREF=["Hombre||NEGRA","Mujer||NEGRA","Mujer||BLANCA","Hombre||BLANCA","Hombre||GRIS","Mujer||GRIS"];
  var stdKeys=[].concat(PREF.filter(function(k){return stdG[k];}), Object.keys(stdG).filter(function(k){return !PREF.includes(k);}));
  var today=new Date().toLocaleDateString("es-GT",{day:"2-digit",month:"long",year:"numeric"});
  var grand=pending.reduce(function(s,o){return s+o.cantidad;},0);
  var html="<html><head><meta charset='UTF-8'><style>body{font-family:Arial;font-size:10pt;}table{border-collapse:collapse;width:620px;}</style></head><body><table>"+
    "<tr><td colspan='5' style='background:#1A202C;color:white;font-weight:bold;font-size:16pt;text-align:center;padding:12px;border:1px solid #000;'>SOLICITUD DE UNIFORMES - FERCO CERAMICA</td></tr>"+
    "<tr><td colspan='5' style='text-align:center;color:#64748B;padding:5px;'>Fecha: "+today+"</td></tr>"+
    "<tr><td colspan='5' style='padding:4px;'>&nbsp;</td></tr>"+
    stdKeys.map(function(k){return tbl(stdG[k],false);}).join("")+
    (Object.keys(spcG).length>0?"<tr><td colspan='5' style='background:#F59E0B;color:white;font-weight:bold;text-align:center;padding:8px;'>PEDIDOS ESPECIALES</td></tr>"+Object.values(spcG).map(function(g){return tbl(g,true);}).join(""):"")+"</table></body></html>";
  var blob=new Blob([html],{type:"application/vnd.ms-excel;charset=utf-8;"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;a.download="Pedido_Uniformes_"+new Date().toISOString().split("T")[0]+".xls";a.click();
  URL.revokeObjectURL(url);
}

// ── Catalog cascades ──────────────────────────────────────────────────────────
function CatSelects(props) {
  var tipos  = Array.from(new Set(CATALOGO.map(function(c){return c.tipo;})));
  var colors = Array.from(new Set(CATALOGO.filter(function(c){return !props.tipo||c.tipo===props.tipo;}).map(function(c){return c.color;})));
  var marcas = Array.from(new Set(CATALOGO.filter(function(c){return (!props.tipo||c.tipo===props.tipo)&&(!props.color||c.color===props.color);}).map(function(c){return c.marca;})));
  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
      <div><label style={sLbl}>Tipo</label>
        <select style={sInp} value={props.tipo} onChange={function(e){props.setTipo(e.target.value);props.setColor("");props.setMarca("");}}>
          <option value="">- Seleccionar -</option>{tipos.map(function(t){return <option key={t}>{t}</option>;})}
        </select></div>
      <div><label style={sLbl}>Color</label>
        <select style={sInp} value={props.color} onChange={function(e){props.setColor(e.target.value);props.setMarca("");}} disabled={!props.tipo}>
          <option value="">- Seleccionar -</option>{colors.map(function(c){return <option key={c}>{c}</option>;})}
        </select></div>
      <div><label style={sLbl}>Marca</label>
        <select style={sInp} value={props.marca} onChange={function(e){props.setMarca(e.target.value);}} disabled={!props.color}>
          <option value="">- Seleccionar -</option>{marcas.map(function(m){return <option key={m}>{m}</option>;})}
        </select></div>
    </div>
  );
}

function PestanaPedidos(props) {
  var orders=props.orders, inv=props.inventory, user=props.user, role=props.role, userName=props.userName;
  var cf=props.cf, setCf=props.setCf;
  var [sf,setSf]             = useState("Todos");
  var [motivoFiltro,setMF]   = useState([]);
  var [showMF,setShowMF]     = useState(false);
  var [modal,setModal]       = useState(null);
  var [confirm,setConf]      = useState(null);
  var [descartaQ,setDescQ]   = useState(null);
  var [editPed,setEditPed]   = useState(null);

  var visible = role==="admin" ? orders : orders.filter(function(o){return o.creadoPor===user.email;});
  // Get motivos disponibles (solo los que tienen pendientes)
  var paisesActivos = cf==="ALL" ? PAISES : [cf];
  var motivosDisponibles = getMotivosPorPais(cf==="ALL"?"GT":cf);
  var motivosConPendientes = motivosDisponibles.filter(function(m){
    return visible.some(function(o){return (cf==="ALL"||o.pais===cf)&&o.estado==="Pendiente"&&o.motivo===m;});
  });
  // Count pendientes per motivo
  function cntPendienteMotivo(m) {
    return visible.filter(function(o){return (cf==="ALL"||o.pais===cf)&&o.estado==="Pendiente"&&o.motivo===m;}).length;
  }
  var filtered = visible.filter(function(o){
    return (cf==="ALL"||o.pais===cf) &&
           (sf==="Todos"||o.estado===sf) &&
           (motivoFiltro.length===0||motivoFiltro.indexOf(o.motivo)>=0);
  });
  var pendingCnt = visible.filter(function(o){return (cf==="ALL"||o.pais===cf)&&o.estado==="Pendiente";}).length;
  var enProdCnt  = visible.filter(function(o){return (cf==="ALL"||o.pais===cf)&&o.estado==="En produccion";}).length;

  function findInv(o) {
    return inv.find(function(i){return i.tipo===o.tipo&&i.color===o.color&&i.marca===o.marca&&i.genero===o.genero&&i.talla===o.talla;});
  }

  async function guardarPedido(formData) {
    var nuevo = Object.assign({},formData,{id:"ORD-"+Date.now(),fecha:new Date().toISOString().split("T")[0],estado:"Pendiente",creadoPor:user.email,creadoPorNombre:userName});
    try {
      await fbDb.collection("pedidos").doc(nuevo.id).set(nuevo);
      // If talla especial, create negative inventory entry
      if (nuevo.talla==="ESPECIAL" && nuevo.tallaEspecial) {
        var invId = "inv-esp-"+nuevo.id;
        await fbDb.collection("inventario").doc(invId).set({
          id:invId, tipo:nuevo.tipo, color:nuevo.color, marca:nuevo.marca,
          genero:nuevo.genero, talla:"ESPECIAL", tallaEspecial:nuevo.tallaEspecial,
          stock:-nuevo.cantidad, observaciones:"Pedido especial: "+nuevo.tallaEspecial,
          esEspecial:true, pedidoId:nuevo.id
        });
      }
      setModal(null);
    }
    catch(e) { alert("Error al guardar: "+e.message); }
  }

  async function toggleEntrega(o) {
    if (o.estado==="Entregado") {
      await fbDb.collection("pedidos").doc(o.id).update({estado:"Pendiente",fechaEntrega:null});
      if (o.talla==="ESPECIAL" && o.tallaEspecial) {
        // Restore special inventory entry
        var invId="inv-esp-"+o.id;
        await fbDb.collection("inventario").doc(invId).set({
          id:invId, tipo:o.tipo, color:o.color, marca:o.marca,
          genero:o.genero, talla:"ESPECIAL", tallaEspecial:o.tallaEspecial,
          stock:-o.cantidad, observaciones:"Pedido especial: "+o.tallaEspecial,
          esEspecial:true, pedidoId:o.id
        });
      } else {
        var i=findInv(o); if(i) await fbDb.collection("inventario").doc(i.id).update({stock:i.stock+o.cantidad});
      }
    } else if (o.estado==="Pendiente") { setConf(o); }
  }

  async function confirmarEntrega() {
    var o=confirm;
    await fbDb.collection("pedidos").doc(o.id).update({estado:"Entregado",fechaEntrega:new Date().toISOString().split("T")[0]});
    if (o.talla==="ESPECIAL") {
      // Delete the special inventory entry
      var espId="inv-esp-"+o.id;
      try { await fbDb.collection("inventario").doc(espId).delete(); } catch(e) {}
    } else {
      var i=findInv(o); if(i) await fbDb.collection("inventario").doc(i.id).update({stock:Math.max(0,i.stock-o.cantidad)});
    }
    setConf(null);
  }

  async function descartar() {
    await fbDb.collection("pedidos").doc(descartaQ.id).update({estado:"Descartado",fechaDescarte:new Date().toISOString().split("T")[0]});
    setDescQ(null);
  }

// ── Inventory Tab ─────────────────────────────────────────────────────────────
function PestanaInventario(props) {
  var inventory=props.inventory, orders=props.orders, resurtidos=props.resurtidos, role=props.role, cf=props.cf, setCf=props.setCf;
  var [fT,setFT]=useState(null), [fC,setFC]=useState(null), [fM,setFM]=useState(null);
  var [editItem,setEditItem]=useState(null), [showRes,setShowRes]=useState(false), [showHist,setShowHist]=useState(false);
  var [resurtidoEsp,setResurtidoEsp]=useState(null);

  var lowList = inventory.filter(function(i){return !i.esEspecial && i.stock<=LOW_STOCK;});
  var demand = {};
  orders.filter(function(o){return (cf==="ALL"||o.pais===cf)&&o.estado==="Pendiente";}).forEach(function(o){
    var k=o.genero+"-"+o.tipo+"-"+o.color+"-"+o.marca+"-"+o.talla;
    demand[k]=(demand[k]||0)+o.cantidad;
  });

  var tipos  = Array.from(new Set(CATALOGO.map(function(c){return c.tipo;})));
  var colors = Array.from(new Set(CATALOGO.filter(function(c){return !fT||c.tipo===fT;}).map(function(c){return c.color;})));
  var marcas = Array.from(new Set(CATALOGO.filter(function(c){return (!fT||c.tipo===fT)&&(!fC||c.color===fC);}).map(function(c){return c.marca;})));

  function reset(lvl) { if(lvl<=0){setFT(null);setFC(null);setFM(null);}else if(lvl<=1){setFC(null);setFM(null);}else setFM(null); }

  var filtInv = inventory.filter(function(i){return (!fT||i.tipo===fT)&&(!fC||i.color===fC)&&(!fM||i.marca===fM);});
  var grouped = {};
  filtInv.forEach(function(i){
    if(!grouped[i.tipo]) grouped[i.tipo]={};
    if(!grouped[i.tipo][i.color]) grouped[i.tipo][i.color]={};
    if(!grouped[i.tipo][i.color][i.marca]) grouped[i.tipo][i.color][i.marca]=[];
    grouped[i.tipo][i.color][i.marca].push(i);
  });

  async function saveStock(id,stock,obs) { await fbDb.collection("inventario").doc(id).update({stock:stock,observaciones:obs}); setEditItem(null); }

  async function handleRes(data) {
    var inv=inventory.find(function(i){return i.tipo===data.tipo&&i.color===data.color&&i.marca===data.marca&&i.genero===data.genero&&i.talla===data.talla;});
    var newStock = inv ? inv.stock+data.cantidad : data.cantidad;
    if (inv) await fbDb.collection("inventario").doc(inv.id).update({stock:newStock});
    await fbDb.collection("resurtidos").add(Object.assign({},data,{stockAntes:inv?inv.stock:0,stockDespues:newStock}));
    setShowRes(false);
  }

  function chip(active,color) {
    return {padding:"5px 12px",borderRadius:20,border:"2px solid",borderColor:active?(color||"#1A202C"):"#E2E8F0",background:active?(color||"#1A202C"):"white",color:active?"white":"#4A5568",fontWeight:700,fontSize:12,cursor:"pointer"};
  }

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,flexWrap:"wrap",gap:12}}>
        <div>
          <h2 style={{margin:"0 0 3px",fontSize:22,fontWeight:700}}>Inventario de Uniformes</h2>
          <p style={{margin:0,color:"#64748B",fontSize:13}}>Alerta stock bajo: menos de {LOW_STOCK} unidades {role!=="admin"?"(solo lectura)":""}</p>
        </div>
        {role==="admin" && <div style={{display:"flex",gap:8}}>
          <button onClick={function(){setShowHist(true);}} style={{padding:"9px 14px",background:"white",color:"#1A202C",border:"1px solid #E2E8F0",borderRadius:10,fontWeight:700,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
            <Ico d={IC.history} size={14}/>Historial {resurtidos.length>0&&<span style={{background:"#166534",color:"white",borderRadius:10,fontSize:10,padding:"1px 6px"}}>{resurtidos.length}</span>}
          </button>
          <button onClick={function(){setShowRes(true);}} style={{padding:"9px 14px",background:"#166534",color:"white",border:"none",borderRadius:10,fontWeight:700,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}><Ico d={IC.res} size={14}/>Registrar Resurtido</button>
        </div>}
      </div>

      {lowList.length>0 && <div style={{background:"#FFF3CD",border:"1px solid #FFE69C",borderRadius:12,padding:"12px 16px",marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8}}><Ico d={IC.alert} size={16}/><span style={{fontWeight:700,color:"#856404",fontSize:13}}>Stock bajo en {lowList.length} articulo(s)</span></div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{lowList.map(function(i){return <span key={i.id} style={{background:"white",border:"1px solid #FCD34D",borderRadius:8,padding:"3px 9px",fontSize:11,fontWeight:600,color:"#92400E"}}>{i.tipo} {i.color} {i.marca} {i.genero} {i.talla}: <strong>{i.stock}</strong></span>;})}</div>
      </div>}

      {role==="admin" && (function(){
        var especiales = orders.filter(function(o){return o.talla==="ESPECIAL"&&o.estado==="Pendiente";});
        if (especiales.length===0) return null;
        return <div style={{background:"#FEF2F2",border:"2px solid #C8102E",borderRadius:14,padding:"16px 20px",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <div style={{width:10,height:10,background:"#C8102E",borderRadius:"50%",animation:"none"}}/>
            <span style={{fontWeight:800,color:"#C8102E",fontSize:14,textTransform:"uppercase",letterSpacing:"0.05em"}}>
              Pedidos Especiales Pendientes ({especiales.length})
            </span>
          </div>
          <div style={{display:"grid",gap:8}}>
            {especiales.map(function(o){return (
              <div key={o.id} style={{background:"white",borderRadius:10,padding:"12px 16px",border:"1px solid #FCA5A5",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                <div>
                  <div style={{fontWeight:700,fontSize:13,color:"#1A202C",marginBottom:2}}>{o.empleado}</div>
                  <div style={{fontSize:12,color:"#64748B"}}>{o.pais} · {o.sucursal} · {o.puesto}</div>
                  <div style={{fontSize:12,color:"#64748B"}}>{o.tipo} {o.color} · {o.marca}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{background:"#7C3AED",color:"white",borderRadius:8,padding:"4px 12px",fontSize:13,fontWeight:800,marginBottom:4}}>
                    TALLA ESPECIAL: {o.tallaEspecial||"-"}
                  </div>
                  <div style={{fontSize:11,color:"#64748B"}}>Gen: {o.genero} · Cant: {o.cantidad} · {o.fecha}</div>
                  <div style={{fontSize:11,color:"#94A3B8"}}>Registrado por: {o.creadoPorNombre||o.creadoPor}</div>
                </div>
                <button onClick={function(){setResurtidoEsp(o);}}
                  style={{padding:"6px 14px",background:"#166534",color:"white",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",alignSelf:"center"}}>
                  + Resurtido
                </button>
              </div>
            );})}
          </div>
        </div>;
      })()}

      <div style={{background:"white",border:"1px solid #F1F5F9",borderRadius:14,padding:"14px 18px",marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:10}}>Filtros en cascada</div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,color:"#64748B",fontWeight:700,marginBottom:6}}>TIPO</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {fT&&<button onClick={function(){reset(0);}} style={chip(false)}>Limpiar todo</button>}
            {tipos.map(function(t){return <button key={t} onClick={function(){t===fT?reset(0):(setFT(t),reset(1));}} style={chip(fT===t)}>{t}</button>;})}
          </div>
        </div>
        {fT&&<div style={{marginBottom:10,paddingLeft:16,borderLeft:"2px solid #E2E8F0"}}>
          <div style={{fontSize:11,color:"#64748B",fontWeight:700,marginBottom:6}}>COLOR</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {fC&&<button onClick={function(){reset(1);}} style={chip(false)}>Limpiar</button>}
            {colors.map(function(c){return <button key={c} onClick={function(){c===fC?reset(1):(setFC(c),reset(2));}} style={chip(fC===c,c==="NEGRA"?"#212529":c==="GRIS"?"#6B7280":"#475569")}>{c}</button>;})}
          </div>
        </div>}
        {fC&&<div style={{paddingLeft:32,borderLeft:"2px solid #E2E8F0"}}>
          <div style={{fontSize:11,color:"#64748B",fontWeight:700,marginBottom:6}}>MARCA</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {fM&&<button onClick={function(){reset(2);}} style={chip(false)}>Limpiar</button>}
            {marcas.map(function(m){return <button key={m} onClick={function(){setFM(m===fM?null:m);}} style={chip(fM===m,"#C8102E")}>{m}</button>;})}
          </div>
        </div>}
      </div>

      <div style={{marginBottom:14}}><PaisFiltro selected={cf} onChange={setCf}/></div>

      {Object.keys(grouped).map(function(tipo){return (
        <div key={tipo} style={{marginBottom:28}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><Badge label={tipo}/><div style={{flex:1,height:1,background:"#F1F5F9"}}/></div>
          {Object.keys(grouped[tipo]).map(function(color){return (
            <div key={color} style={{marginBottom:18,paddingLeft:16,borderLeft:"3px solid #F1F5F9"}}>
              <div style={{marginBottom:12,display:"flex",alignItems:"center",gap:8}}><Badge label={color}/></div>
              {Object.keys(grouped[tipo][color]).map(function(marca){
                var items = grouped[tipo][color][marca];
                return (
                  <div key={marca} style={{marginBottom:16,paddingLeft:16}}>
                    <div style={{fontSize:11,color:"#94A3B8",fontWeight:700,marginBottom:8,textTransform:"uppercase"}}>Logo: {marca}</div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:8}}>
                      {items.slice().sort(function(a,b){var ag=a.genero==="Hombre"?0:1,bg=b.genero==="Hombre"?0:1;if(ag!==bg)return ag-bg;return(TALLAS.indexOf(a.talla)||0)-(TALLAS.indexOf(b.talla)||0);}).map(function(item){
                        var dk=item.genero+"-"+item.tipo+"-"+item.color+"-"+item.marca+"-"+item.talla;
                        var dem=demand[dk]||0, isLow=!item.esEspecial&&item.stock<=LOW_STOCK, isOut=!item.esEspecial&&item.stock===0;
                        return (
                          <div key={item.id} style={{background:"white",borderRadius:12,padding:14,border:"2px solid "+(isOut?"#FCA5A5":isLow?"#FCD34D":"#F1F5F9"),position:"relative",overflow:"hidden"}}>
                            {item.esEspecial&&<div style={{position:"absolute",top:0,right:0,background:"#7C3AED",color:"white",fontSize:9,fontWeight:800,padding:"2px 6px",borderBottomLeftRadius:6}}>ESPECIAL</div>}
                            {!item.esEspecial&&isOut&&<div style={{position:"absolute",top:0,right:0,background:"#EF4444",color:"white",fontSize:9,fontWeight:800,padding:"2px 6px",borderBottomLeftRadius:6}}>AGOTADO</div>}
                            {!item.esEspecial&&isLow&&!isOut&&<div style={{position:"absolute",top:0,right:0,background:"#F59E0B",color:"white",fontSize:9,fontWeight:800,padding:"2px 6px",borderBottomLeftRadius:6}}>BAJO</div>}
                            <div style={{fontSize:10,color:"#94A3B8",fontWeight:700,textTransform:"uppercase"}}>{item.genero}</div>
                            <div style={{fontSize:22,fontWeight:900,color:item.esEspecial?"#7C3AED":"#1A202C",lineHeight:1.1}}>{item.talla==="ESPECIAL"?(item.tallaEspecial||"ESPECIAL"):item.talla}</div>
                            {item.esEspecial&&<div style={{fontSize:10,background:"#7C3AED",color:"white",borderRadius:6,padding:"2px 6px",display:"inline-block",marginBottom:2,fontWeight:700}}>PEDIDO ESPECIAL</div>}
                            <div style={{fontSize:28,fontWeight:900,color:item.esEspecial?"#7C3AED":isOut?"#EF4444":isLow?"#F59E0B":"#1A202C",lineHeight:1}}>{item.esEspecial?"PEND":item.stock}<span style={{fontSize:11,fontWeight:400,color:"#94A3B8"}}>{item.esEspecial?"":"u"}</span></div>
                            {dem>0&&<div style={{fontSize:10,color:"#C8102E",fontWeight:700,marginTop:2}}>-{dem} pend - disp: <strong>{item.stock-dem}</strong></div>}
                            {role==="admin"&&!item.esEspecial&&<button onClick={function(){setEditItem(item);}} style={{marginTop:6,width:"100%",padding:"4px 0",background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:6,cursor:"pointer",color:"#64748B",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}><Ico d={IC.edit} size={11}/>Editar</button>}
                          {item.esEspecial&&<div style={{marginTop:6,fontSize:10,color:"#7C3AED",textAlign:"center",fontStyle:"italic"}}>Se elimina al entregar</div>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          );})}
        </div>
      );})}
      {Object.keys(grouped).length===0&&<div style={{textAlign:"center",padding:48,color:"#94A3B8"}}>Selecciona filtros para ver el inventario</div>}

      {showHist && <Modal title="Historial de Resurtidos" onClose={function(){setShowHist(false);}} wide>
        {resurtidos.length===0 ? <p style={{textAlign:"center",color:"#94A3B8",padding:"24px 0"}}>No hay resurtidos registrados.</p>
          : <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr>{["Fecha","Hora","Responsable","Tipo","Color","Marca","Genero","Talla","Cant.","Antes","Despues","Notas"].map(function(h){return <th key={h} style={sTH}>{h}</th>;})}</tr></thead>
            <tbody>{resurtidos.slice().reverse().map(function(r,i){return (
              <tr key={r.id||i} style={{background:i%2===0?"white":"#FAFBFC",borderBottom:"1px solid #F8FAFC"}}>
                <td style={{padding:"9px 12px",color:"#64748B",whiteSpace:"nowrap"}}>{r.fecha}</td>
                <td style={{padding:"9px 12px",color:"#64748B"}}>{r.hora}</td>
                <td style={{padding:"9px 12px",fontWeight:600,whiteSpace:"nowrap"}}>{r.responsable}</td>
                <td style={{padding:"9px 12px"}}><Badge label={r.tipo}/></td>
                <td style={{padding:"9px 12px"}}><Badge label={r.color}/></td>
                <td style={{padding:"9px 12px",fontSize:11,color:"#475569",whiteSpace:"nowrap"}}>{r.marca}</td>
                <td style={{padding:"9px 12px",color:"#64748B"}}>{r.genero}</td>
                <td style={{padding:"9px 12px",fontWeight:700,textAlign:"center"}}>{r.talla}</td>
                <td style={{padding:"9px 12px",textAlign:"center"}}><span style={{background:"#DCFCE7",color:"#166534",fontWeight:800,padding:"2px 8px",borderRadius:10}}>+{r.cantidad}</span></td>
                <td style={{padding:"9px 12px",textAlign:"center",color:"#64748B"}}>{r.stockAntes}</td>
                <td style={{padding:"9px 12px",textAlign:"center",fontWeight:700,color:"#166534"}}>{r.stockDespues}</td>
                <td style={{padding:"9px 12px",color:"#94A3B8",fontStyle:"italic"}}>{r.notas||"-"}</td>
              </tr>
            );})}
            </tbody>
          </table></div>}
      </Modal>}
      {showRes && <ModalResurtido onClose={function(){setShowRes(false);}} onSave={handleRes}/>}
      {resurtidoEsp && <ModalResurtido
        onClose={function(){setResurtidoEsp(null);}}
        preFilled={{
          tipo:resurtidoEsp.tipo, color:resurtidoEsp.color, marca:resurtidoEsp.marca,
          genero:resurtidoEsp.genero,
          talla:resurtidoEsp.talla==="ESPECIAL"?"ESPECIAL":resurtidoEsp.talla,
          notas:"Pedido especial: "+(resurtidoEsp.tallaEspecial||"")+" - "+resurtidoEsp.empleado
        }}
        onSave={function(data){handleRes(data);setResurtidoEsp(null);}}
      />}
      {editItem && <ModalEditarStock item={editItem} onClose={function(){setEditItem(null);}} onSave={saveStock}/>}
    </div>
  );
}

// ── App Root ──────────────────────────────────────────────────────────────────
function App() {
  var [authUser,setAuthUser] = useState(undefined);
  var [tab,setTab]           = useState("orders");
  var [cf,setCf]             = useState("ALL");
  var [orders,setOrders]     = useState([]);
  var [inventory,setInv]     = useState([]);
  var [resurtidos,setRes]    = useState([]);

  useEffect(function(){
    return fbAuth.onAuthStateChanged(function(u){ setAuthUser(u||null); });
  },[]);

  var role     = authUser ? (ROLES[authUser.email]||"reclutamiento") : null;
  var userName = authUser ? (NOMBRES[authUser.email]||authUser.email) : null;

  useEffect(function(){
    if (!authUser) return;
    var unsubs = [];
    unsubs.push(fbDb.collection("pedidos").orderBy("fecha","desc").onSnapshot(function(snap){
      setOrders(snap.docs.map(function(d){return Object.assign({},d.data(),{id:d.id});}));
    }));
    unsubs.push(fbDb.collection("inventario").onSnapshot(async function(snap){
      if (snap.empty) {
        var batch = fbDb.batch();
        buildInventario().forEach(function(item){ batch.set(fbDb.collection("inventario").doc(item.id),item); });
        await batch.commit();
      } else {
        setInv(snap.docs.map(function(d){return Object.assign({},d.data(),{id:d.id});}));
      }
    }));
    unsubs.push(fbDb.collection("resurtidos").orderBy("fecha","desc").onSnapshot(function(snap){
      setRes(snap.docs.map(function(d){return Object.assign({},d.data(),{id:d.id});}));
    }));
    return function(){ unsubs.forEach(function(u){u();}); };
  },[authUser]);

  function logout() { fbAuth.signOut(); }

  var visOrders = role==="admin" ? orders : orders.filter(function(o){return o.creadoPor===(authUser&&authUser.email);});
  var lowCnt    = inventory.filter(function(i){return i.stock<=LOW_STOCK;}).length;
  var pendCnt   = visOrders.filter(function(o){return (cf==="ALL"||o.pais===cf)&&o.estado==="Pendiente";}).length;

  if (authUser===undefined) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#1A202C"}}>
      <div style={{textAlign:"center",color:"white"}}>
        <div style={{width:48,height:48,background:"#C8102E",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}><Ico d={IC.inv} size={24} color="white"/></div>
        <p style={{fontSize:14,color:"#94A3B8"}}>Cargando...</p>
      </div>
    </div>
  );

  if (!authUser) return <LoginScreen/>;

  var TABS = [
    {id:"orders",  label:"Pedidos",    icon:IC.orders,  badge:pendCnt},
    {id:"history", label:"Historico",  icon:IC.history, badge:0},
    {id:"inv",     label:"Inventario", icon:IC.inv,     badge:lowCnt, bColor:"#F59E0B"},
  ];

  return (
    <div style={{minHeight:"100vh",background:"#F8FAFC"}}>
      <header style={{background:"#1A202C",padding:"0 24px",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 10px rgba(0,0,0,0.3)"}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",height:56}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:28,height:28,background:"#C8102E",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center"}}><Ico d={IC.inv} size={15} color="white"/></div>
            <div><div style={{color:"white",fontSize:15,fontWeight:700,lineHeight:1}}>FERCO</div><div style={{color:"#64748B",fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase"}}>Control de Uniformes</div></div>
          </div>
          <nav style={{display:"flex",gap:3}}>
            {TABS.map(function(t){return (
              <button key={t.id} onClick={function(){setTab(t.id);}}
                style={{padding:"6px 13px",background:tab===t.id?"rgba(200,16,46,0.2)":"transparent",border:tab===t.id?"1px solid rgba(200,16,46,0.4)":"1px solid transparent",borderRadius:8,color:tab===t.id?"#FCA5A5":"#94A3B8",fontWeight:tab===t.id?700:500,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:5,position:"relative"}}>
                <Ico d={t.icon} size={14}/><span>{t.label}</span>
                {t.badge>0&&<span style={{position:"absolute",top:-4,right:-4,background:t.bColor||"#C8102E",color:"white",borderRadius:10,fontSize:9,fontWeight:800,padding:"1px 4px",minWidth:14,textAlign:"center"}}>{t.badge}</span>}
              </button>
            );})}
          </nav>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{textAlign:"right"}}>
              <div style={{color:"white",fontSize:12,fontWeight:600}}>{userName}</div>
              <Badge label={role}/>
            </div>
            <button onClick={logout} title="Cerrar sesion" style={{width:34,height:34,borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#94A3B8"}}>
              <Ico d={IC.logout} size={16}/>
            </button>
          </div>
        </div>
      </header>
      <main style={{maxWidth:1200,margin:"0 auto",padding:"24px 20px"}}>
        {tab==="orders"  && <PestanaPedidos  orders={orders} inventory={inventory} cf={cf} setCf={setCf} user={authUser} role={role} userName={userName}/>}
        {tab==="history" && <PestanaHistorico orders={orders} cf={cf} setCf={setCf} user={authUser} role={role}/>}
        {tab==="inv"     && <PestanaInventario inventory={inventory} orders={orders} resurtidos={resurtidos} cf={cf} setCf={setCf} role={role}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
