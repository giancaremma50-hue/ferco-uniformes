function generateExcel(orders){
  const GM={Hombre:"MASCULINO",Mujer:"FEMENINO"},CP={BLANCA:"BLANCAS",NEGRA:"NEGRAS"};
  const pending=orders.filter(o=>o.estado==="Pendiente");
  const std=pending.filter(o=>o.marca===STD_MARCA),spc=pending.filter(o=>o.marca!==STD_MARCA);
  const groupBy=(arr,fn)=>{const m={};arr.forEach(o=>{const k=fn(o);(m[k]=m[k]||[]).push(o);});return m;};
  const sortT=arr=>[...arr].sort((a,b)=>(TALLA_ORDER.indexOf(a.talla)||99)-(TALLA_ORDER.indexOf(b.talla)||99));
  const agg=arr=>{const a={};arr.forEach(o=>{const k=o.genero+"|"+o.talla+"|"+o.color+"|"+o.marca;if(!a[k])a[k]={...o,cantidad:0};a[k].cantidad+=o.cantidad;});return Object.values(a);};
  const tbl=(rows,sp)=>{const s=sortT(agg(rows)),t=s.reduce((x,r)=>x+r.cantidad,0),bg=sp?"#F59E0B":"#C8102E";
    return "<tr><td colspan='5' style='background:"+bg+";color:white;font-weight:bold;padding:6px 10px;border:1px solid #ccc;'>Pedidos</td></tr><tr style='background:#1A202C;color:white;font-weight:bold;text-align:center;'><td style='border:1px solid #555;padding:5px;'>GENERO</td><td style='border:1px solid #555;padding:5px;'>TALLA</td><td style='border:1px solid #555;padding:5px;'>COLOR</td><td style='border:1px solid #555;padding:5px;'>MARCA</td><td style='border:1px solid #555;padding:5px;'>CANTIDAD</td></tr>"+s.map((r,i)=>"<tr style='background:"+(i%2===0?"#F8FAFC":"#FFF")+"'><td style='border:1px solid #E2E8F0;padding:5px;'>"+(GM[r.genero]||r.genero.toUpperCase())+"</td><td style='border:1px solid #E2E8F0;padding:5px;text-align:center;'>"+r.talla+"</td><td style='border:1px solid #E2E8F0;padding:5px;'>"+(CP[r.color]||r.color)+"</td><td style='border:1px solid #E2E8F0;padding:5px;'>"+r.marca+"</td><td style='border:1px solid #E2E8F0;padding:5px;text-align:center;font-weight:bold;'>"+r.cantidad+"</td></tr>").join("")+"<tr style='background:#EBF4FF;font-weight:bold;'><td colspan='4' style='border:1px solid #E2E8F0;padding:5px;text-align:right;'>TOTAL</td><td style='border:1px solid #E2E8F0;padding:5px;text-align:center;'>"+t+"</td></tr><tr><td colspan='5' style='padding:4px;'>&nbsp;</td></tr>";
  };
  const stdG=groupBy(std,o=>o.genero+"||"+o.color),spcG=groupBy(spc,o=>o.genero+"||"+o.color+"||"+o.marca);
  const PREF=["Hombre||NEGRA","Mujer||NEGRA","Mujer||BLANCA","Hombre||BLANCA"];
  const stdKeys=[...PREF.filter(k=>stdG[k]),...Object.keys(stdG).filter(k=>!PREF.includes(k))];
  const today=new Date().toLocaleDateString("es-GT",{day:"2-digit",month:"long",year:"numeric"});
  const grand=pending.reduce((s,o)=>s+o.cantidad,0);
  const html="<html xmlns:o='urn:schemas-microsoft-com:office:office'><head><meta charset='UTF-8'><style>body{font-family:Arial;font-size:10pt;}table{border-collapse:collapse;width:620px;}</style></head><body><table><tr><td colspan='5' style='background:#1A202C;color:white;font-weight:bold;font-size:16pt;text-align:center;padding:12px;border:1px solid #000;'>SOLICITUD DE UNIFORMES - FERCO CERAMICA</td></tr><tr><td colspan='5' style='text-align:center;color:#64748B;padding:5px;border:1px solid #E2E8F0;'>Fecha: "+today+"</td></tr><tr><td colspan='5' style='padding:4px;'>&nbsp;</td></tr>"+stdKeys.map(k=>tbl(stdG[k],false)).join("")+(Object.keys(spcG).length>0?"<tr><td colspan='5' style='background:#F59E0B;color:white;font-weight:bold;font-size:13pt;text-align:center;padding:8px;border:1px solid #ccc;'>PEDIDOS ESPECIALES</td></tr><tr><td colspan='5' style='padding:4px;'>&nbsp;</td></tr>"+Object.values(spcG).map(g=>tbl(g,true)).join(""):"")+"<tr><td colspan='4' style='background:#1A202C;color:white;font-weight:bold;font-size:12pt;text-align:right;padding:8px 12px;border:1px solid #000;'>TOTAL GENERAL</td><td style='background:#C8102E;color:white;font-weight:bold;font-size:14pt;text-align:center;border:1px solid #000;'>"+grand+"</td></tr></table></body></html>";
  const blob=new Blob([html],{type:"application/vnd.ms-excel;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="Pedido_Uniformes_"+new Date().toISOString().split("T")[0]+".xls";a.click();
  URL.revokeObjectURL(url);
}

async function callAI(messages){
  const res=await fetch("/.netlify/functions/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages})});
  const data=await res.json();
  const txt=data.content&&data.content[0]?data.content[0].text||"":"";
  return JSON.parse(txt.replace(/```json|```/g,"").trim());
}

function CatSelects({tipo,setTipo,color,setColor,marca,setMarca}){
  const tipos=[...new Set(CATALOG.map(c=>c.tipo))];
  const colors=[...new Set(CATALOG.filter(c=>!tipo||c.tipo===tipo).map(c=>c.color))];
  const marcas=[...new Set(CATALOG.filter(c=>(!tipo||c.tipo===tipo)&&(!color||c.color===color)).map(c=>c.marca))];
  const s={width:"100%",padding:"8px 12px",border:"1px solid #E2E8F0",borderRadius:8,fontSize:13,background:"white",boxSizing:"border-box"};
  const l={fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:4};
  return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
    <div><label style={l}>Tipo</label><select style={s} value={tipo} onChange={e=>{setTipo(e.target.value);setColor("");setMarca("");}}><option value="">- Seleccionar -</option>{tipos.map(t=><option key={t}>{t}</option>)}</select></div>
    <div><label style={l}>Color</label><select style={s} value={color} onChange={e=>{setColor(e.target.value);setMarca("");}} disabled={!tipo}><option value="">- Seleccionar -</option>{colors.map(c=><option key={c}>{c}</option>)}</select></div>
    <div><label style={l}>Marca</label><select style={s} value={marca} onChange={e=>setMarca(e.target.value)} disabled={!color}><option value="">- Seleccionar -</option>{marcas.map(m=><option key={m}>{m}</option>)}</select></div>
  </div>;
}

function ImageModal({onClose,onSave,nextId}){

        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr>{["ID","Fecha","Empleado","Pais","Sucursal","Puesto","Motivo","Tipo","Color","Marca","Talla","Gen.","Cant.","Estado","F.Entrega","F.Descarte"].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
          <tbody>{filtered.length===0?<tr><td colSpan={16} style={{textAlign:"center",padding:40,color:"#94A3B8"}}>Sin resultados</td></tr>
            :filtered.map((o,i)=><tr key={o.id} style={{background:i%2===0?"white":"#FAFBFC",borderBottom:"1px solid #F8FAFC",opacity:o.estado==="Descartado"?0.6:1}}>
              <td style={{padding:"9px 12px",fontWeight:700,color:"#C8102E",fontFamily:"monospace"}}>{o.id}</td>
              <td style={{padding:"9px 12px",color:"#64748B",whiteSpace:"nowrap"}}>{o.fecha}</td>
              <td style={{padding:"9px 12px",fontWeight:600,whiteSpace:"nowrap"}}>{o.empleado}</td>
              <td style={{padding:"9px 12px"}}><span style={{fontWeight:700,color:"#C8102E"}}>{o.pais}</span></td>
              <td style={{padding:"9px 12px",color:"#64748B",whiteSpace:"nowrap"}}>{o.sucursal}</td>
              <td style={{padding:"9px 12px",color:"#64748B"}}>{o.puesto}</td>
              <td style={{padding:"9px 12px",color:"#64748B"}}>{o.motivo}</td>
              <td style={{padding:"9px 12px"}}><Badge label={o.tipo}/></td>
              <td style={{padding:"9px 12px"}}><Badge label={o.color}/></td>
              <td style={{padding:"9px 12px",color:"#475569",fontSize:11,whiteSpace:"nowrap"}}>{o.marca}</td>
              <td style={{padding:"9px 12px",fontWeight:700,textAlign:"center"}}>{o.talla}</td>
              <td style={{padding:"9px 12px",color:"#64748B"}}>{o.genero}</td>
              <td style={{padding:"9px 12px",textAlign:"center"}}>{o.cantidad}</td>
              <td style={{padding:"9px 12px"}}><Badge label={o.estado}/></td>
              <td style={{padding:"9px 12px",color:"#64748B",whiteSpace:"nowrap"}}>{o.fechaEntrega||"-"}</td>
              <td style={{padding:"9px 12px",color:"#64748B",whiteSpace:"nowrap"}}>{o.fechaDescarte||"-"}</td>
            </tr>)}
          </tbody>
        </table>
      </div>
    </div>
  </div>;
}

function InventoryTab({inventory,setInventory,orders,resurtidos,setResurtidos,cf,setCf}){
  const [fT,setFT]=useState(null),[fC,setFC]=useState(null),[fM,setFM]=useState(null);
  const [editItem,setEditItem]=useState(null),[showRes,setShowRes]=useState(false),[showHist,setShowHist]=useState(false);
  const lowList=inventory.filter(i=>i.stock<=LOW_STOCK);
  const demand={};
  orders.filter(o=>(cf==="ALL"||o.pais===cf)&&o.estado==="Pendiente").forEach(o=>{const k=o.genero+"-"+o.tipo+"-"+o.color+"-"+o.marca+"-"+o.talla;demand[k]=(demand[k]||0)+o.cantidad;});
  const tipos=[...new Set(CATALOG.map(c=>c.tipo))];
  const colors=[...new Set(CATALOG.filter(c=>!fT||c.tipo===fT).map(c=>c.color))];
  const marcas=[...new Set(CATALOG.filter(c=>(!fT||c.tipo===fT)&&(!fC||c.color===fC)).map(c=>c.marca))];
  const reset=lvl=>{if(lvl<=0){setFT(null);setFC(null);setFM(null);}else if(lvl<=1){setFC(null);setFM(null);}else setFM(null);};
  const filtered=inventory.filter(i=>(!fT||i.tipo===fT)&&(!fC||i.color===fC)&&(!fM||i.marca===fM));
  const grouped={};
  filtered.forEach(i=>{grouped[i.tipo]=grouped[i.tipo]||{};grouped[i.tipo][i.color]=grouped[i.tipo][i.color]||{};grouped[i.tipo][i.color][i.marca]=grouped[i.tipo][i.color][i.marca]||[];grouped[i.tipo][i.color][i.marca].push(i);});
  const saveStock=(id,stock,obs)=>{setInventory(p=>p.map(i=>i.id===id?{...i,stock,observaciones:obs}:i));setEditItem(null);};
  const handleRes=data=>{const inv=inventory.find(i=>i.tipo===data.tipo&&i.color===data.color&&i.marca===data.marca&&i.genero===data.genero&&i.talla===data.talla);if(inv)setInventory(p=>p.map(i=>i.id===inv.id?{...i,stock:i.stock+data.cantidad}:i));setResurtidos(p=>[...p,{...data,stockAntes:inv?inv.stock:0,stockDespues:inv?inv.stock+data.cantidad:data.cantidad}]);setShowRes(false);};
  const chip=(active,color)=>({padding:"5px 12px",borderRadius:20,border:"2px solid",borderColor:active?(color||"#1A202C"):"#E2E8F0",background:active?(color||"#1A202C"):"white",color:active?"white":"#4A5568",fontWeight:700,fontSize:12,cursor:"pointer"});
  const th={padding:"9px 12px",textAlign:"left",fontWeight:700,color:"#64748B",fontSize:11,textTransform:"uppercase",whiteSpace:"nowrap",borderBottom:"1px solid #F1F5F9",background:"#F8FAFC"};
  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,flexWrap:"wrap",gap:12}}>
      <div><h2 style={{margin:"0 0 3px",fontSize:22,fontWeight:700}}>Inventario de Uniformes</h2><p style={{margin:0,color:"#64748B",fontSize:13}}>Alerta stock bajo: menos de {LOW_STOCK} unidades</p></div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setShowHist(true)} style={{padding:"9px 14px",background:"white",color:"#1A202C",border:"1px solid #E2E8F0",borderRadius:10,fontWeight:700,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}><Ic d={I.history} size={14}/>Historial {resurtidos.length>0&&<span style={{background:"#166534",color:"white",borderRadius:10,fontSize:10,padding:"1px 6px"}}>{resurtidos.length}</span>}</button>
        <button onClick={()=>setShowRes(true)} style={{padding:"9px 14px",background:"#166534",color:"white",border:"none",borderRadius:10,fontWeight:700,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}><Ic d={I.res} size={14}/>Registrar Resurtido</button>
      </div>
    </div>
    {lowList.length>0&&<div style={{background:"#FFF3CD",border:"1px solid #FFE69C",borderRadius:12,padding:"12px 16px",marginBottom:16}}>
      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8}}><Ic d={I.alert} size={16}/><span style={{fontWeight:700,color:"#856404",fontSize:13}}>Stock bajo en {lowList.length} articulo(s)</span></div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{lowList.map(i=><span key={i.id} style={{background:"white",border:"1px solid #FCD34D",borderRadius:8,padding:"3px 9px",fontSize:11,fontWeight:600,color:"#92400E"}}>{i.tipo} {i.color} {i.marca} {i.genero} {i.talla}: <strong>{i.stock}</strong></span>)}</div>
    </div>}
    <div style={{background:"white",border:"1px solid #F1F5F9",borderRadius:14,padding:"14px 18px",marginBottom:14}}>
      <div style={{fontSize:11,fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:10}}>Filtros en cascada</div>
      <div style={{marginBottom:10}}>
        <div style={{fontSize:11,color:"#64748B",fontWeight:700,marginBottom:6}}>TIPO</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {fT&&<button onClick={()=>reset(0)} style={chip(false)}>Limpiar todo</button>}
          {tipos.map(t=><button key={t} onClick={()=>{t===fT?reset(0):(setFT(t),reset(1));}} style={chip(fT===t)}>{t}</button>)}
        </div>
      </div>
      {fT&&<div style={{marginBottom:10,paddingLeft:16,borderLeft:"2px solid #E2E8F0"}}>
        <div style={{fontSize:11,color:"#64748B",fontWeight:700,marginBottom:6}}>COLOR</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {fC&&<button onClick={()=>reset(1)} style={chip(false)}>Limpiar</button>}
          {colors.map(c=><button key={c} onClick={()=>{c===fC?reset(1):(setFC(c),reset(2));}} style={chip(fC===c,c==="NEGRA"?"#212529":"#475569")}>{c}</button>)}
        </div>
      </div>}
      {fC&&<div style={{paddingLeft:32,borderLeft:"2px solid #E2E8F0"}}>
        <div style={{fontSize:11,color:"#64748B",fontWeight:700,marginBottom:6}}>MARCA</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {fM&&<button onClick={()=>reset(2)} style={chip(false)}>Limpiar</button>}
          {marcas.map(m=><button key={m} onClick={()=>setFM(m===fM?null:m)} style={chip(fM===m,"#C8102E")}>{m}</button>)}
        </div>
      </div>}
    </div>
    <div style={{marginBottom:14}}><CountryFilter selected={cf} onChange={setCf}/></div>
    {Object.entries(grouped).map(([tipo,byColor])=><div key={tipo} style={{marginBottom:28}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><Badge label={tipo}/><div style={{flex:1,height:1,background:"#F1F5F9"}}/></div>
      {Object.entries(byColor).map(([color,byMarca])=><div key={color} style={{marginBottom:18,paddingLeft:16,borderLeft:"3px solid #F1F5F9"}}>
        <div style={{marginBottom:12,display:"flex",alignItems:"center",gap:8}}><Badge label={color}/></div>
        {Object.entries(byMarca).map(([marca,items])=><div key={marca} style={{marginBottom:16,paddingLeft:16}}>
          <div style={{fontSize:11,color:"#94A3B8",fontWeight:700,marginBottom:8,textTransform:"uppercase"}}>Logo: {marca}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:8}}>
            {[...items].sort((a,b)=>{const ag=a.genero==="Hombre"?0:1,bg=b.genero==="Hombre"?0:1;if(ag!==bg)return ag-bg;return(TALLA_ORDER.indexOf(a.talla)||0)-(TALLA_ORDER.indexOf(b.talla)||0);}).map(item=>{
              const dk=item.genero+"-"+item.tipo+"-"+item.color+"-"+item.marca+"-"+item.talla;
              const dem=demand[dk]||0,isLow=item.stock<=LOW_STOCK,isOut=item.stock===0;
              return <div key={item.id} style={{background:"white",borderRadius:12,padding:14,border:"2px solid "+(isOut?"#FCA5A5":isLow?"#FCD34D":"#F1F5F9"),position:"relative",overflow:"hidden"}}>
                {isOut&&<div style={{position:"absolute",top:0,right:0,background:"#EF4444",color:"white",fontSize:9,fontWeight:800,padding:"2px 6px",borderBottomLeftRadius:6}}>AGOTADO</div>}
                {isLow&&!isOut&&<div style={{position:"absolute",top:0,right:0,background:"#F59E0B",color:"white",fontSize:9,fontWeight:800,padding:"2px 6px",borderBottomLeftRadius:6}}>BAJO</div>}
                <div style={{fontSize:10,color:"#94A3B8",fontWeight:700,textTransform:"uppercase"}}>{item.genero}</div>
                <div style={{fontSize:22,fontWeight:900,color:"#1A202C",lineHeight:1.1}}>{item.talla}</div>
                <div style={{fontSize:28,fontWeight:900,color:isOut?"#EF4444":isLow?"#F59E0B":"#1A202C",lineHeight:1}}>{item.stock}<span style={{fontSize:11,fontWeight:400,color:"#94A3B8"}}>u</span></div>
                {dem>0&&<div style={{fontSize:10,color:"#C8102E",fontWeight:700,marginTop:2}}>-{dem} pend - disp: <strong>{item.stock-dem}</strong></div>}
                <button onClick={()=>setEditItem(item)} style={{marginTop:6,width:"100%",padding:"4px 0",background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:6,cursor:"pointer",color:"#64748B",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}><Ic d={I.edit} size={11}/>Editar</button>
              </div>;
            })}
          </div>
        </div>)}
      </div>)}
    </div>)}
    {Object.keys(grouped).length===0&&<div style={{textAlign:"center",padding:48,color:"#94A3B8"}}>Selecciona filtros para ver el inventario</div>}
    {showHist&&<Modal title="Historial de Resurtidos" onClose={()=>setShowHist(false)} wide>
      {resurtidos.length===0?<p style={{textAlign:"center",color:"#94A3B8",padding:"24px 0"}}>No hay resurtidos registrados.</p>
        :<div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr>{["Fecha","Hora","Responsable","Tipo","Color","Marca","Genero","Talla","Cant.","Antes","Despues","Notas"].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
          <tbody>{[...resurtidos].reverse().map((r,i)=><tr key={r.id} style={{background:i%2===0?"white":"#FAFBFC",borderBottom:"1px solid #F8FAFC"}}>
            <td style={{padding:"9px 12px",color:"#64748B",whiteSpace:"nowrap"}}>{r.fecha}</td>
            <td style={{padding:"9px 12px",color:"#64748B"}}>{r.hora}</td>
            <td style={{padding:"9px 12px",fontWeight:600,whiteSpace:"nowrap"}}>{r.responsable}</td>
            <td style={{padding:"9px 12px"}}><Badge label={r.tipo}/></td>
            <td style={{padding:"9px 12px"}}><Badge label={r.color}/></td>
            <td style={{padding:"9px 12px",fontSize:11,color:"#475569",whiteSpace:"nowrap"}}>{r.marca}</td>
            <td style={{padding:"9px 12px",color:"#64748B"}}>{r.genero}</td>
            <td style={{padding:"9px 12px",fontWeight:700,textAlign:"center"}}>{r.talla}</td>
            <td style={{padding:"9px 12px",textAlign:"center"}}><span style={{background:"#DCFCE7",color:"#166534",fontWeight:800,padding:"2px 8px",borderRadius:10}}>+{r.cantidad}</span></td>
            <td style={{padding:"9px 12px",textAlign:"center",color:"#64748B"}}>{r.stockAntes}</td>
            <td style={{padding:"9px 12px",textAlign:"center",fontWeight:700,color:"#166534"}}>{r.stockDespues}</td>
            <td style={{padding:"9px 12px",color:"#94A3B8",fontStyle:"italic"}}>{r.notas||"-"}</td>
          </tr>)}</tbody>
        </table></div>}
    </Modal>}
    {showRes&&<ResurtidoModal onClose={()=>setShowRes(false)} onSave={handleRes}/>}
    {editItem&&<EditStockModal item={editItem} onClose={()=>setEditItem(null)} onSave={saveStock}/>}
  </div>;
}

function App(){
  const [tab,setTab]=useState("orders"),[cf,setCf]=useState("ALL");
  const [orders,setOrders]=useState(()=>load("ferco_orders_v4",SAMPLE_ORDERS));
  const [inv,setInv]=useState(()=>load("ferco_inv_v4",INIT_INV));
  const [res,setRes]=useState(()=>load("ferco_res_v4",[]));
  useEffect(()=>save("ferco_orders_v4",orders),[orders]);
  useEffect(()=>save("ferco_inv_v4",inv),[inv]);
  useEffect(()=>save("ferco_res_v4",res),[res]);
  const lowCnt=inv.filter(i=>i.stock<=LOW_STOCK).length;
  const pendCnt=orders.filter(o=>(cf==="ALL"||o.pais===cf)&&o.estado==="Pendiente").length;
  const TABS=[{id:"orders",label:"Pedidos",icon:I.orders,badge:pendCnt},{id:"history",label:"Historico",icon:I.history,badge:0},{id:"inv",label:"Inventario",icon:I.inv,badge:lowCnt,bColor:"#F59E0B"}];
  return <div style={{minHeight:"100vh",background:"#F8FAFC"}}>
    <header style={{background:"#1A202C",padding:"0 24px",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 10px rgba(0,0,0,0.3)"}}>
      <div style={{maxWidth:1200,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",height:56}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:28,height:28,background:"#C8102E",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic d={I.inv} size={15} style={{color:"white"}}/></div>
          <div><div style={{color:"white",fontSize:15,fontWeight:700,lineHeight:1}}>FERCO</div><div style={{color:"#64748B",fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase"}}>Control de Uniformes</div></div>
        </div>
        <nav style={{display:"flex",gap:3}}>
          {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"6px 13px",background:tab===t.id?"rgba(200,16,46,0.2)":"transparent",border:tab===t.id?"1px solid rgba(200,16,46,0.4)":"1px solid transparent",borderRadius:8,color:tab===t.id?"#FCA5A5":"#94A3B8",fontWeight:tab===t.id?700:500,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:5,position:"relative"}}>
            <Ic d={t.icon} size={14}/><span>{t.label}</span>
            {t.badge>0&&<span style={{position:"absolute",top:-4,right:-4,background:t.bColor||"#C8102E",color:"white",borderRadius:10,fontSize:9,fontWeight:800,padding:"1px 4px",minWidth:14,textAlign:"center"}}>{t.badge}</span>}
          </button>)}
        </nav>
      </div>
    </header>
    <main style={{maxWidth:1200,margin:"0 auto",padding:"24px 20px"}}>
      {tab==="orders"&&<OrdersTab orders={orders} setOrders={setOrders} inventory={inv} setInventory={setInv} cf={cf} setCf={setCf}/>}
      {tab==="history"&&<HistoryTab orders={orders} cf={cf} setCf={setCf}/>}
      {tab==="inv"&&<InventoryTab inventory={inv} setInventory={setInv} orders={orders} resurtidos={res} setResurtidos={setRes} cf={cf} setCf={setCf}/>}
    </main>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
